app = "aiclone-backend"
primary_region = "sin"

[build]
  context = "."

[env]
  HF_BASE_URL = "https://router.huggingface.co/v1"
  HF_MODEL = "mistralai/Mistral-7B-Instruct-v0.2"
  CORS_ORIGINS = "https://frontend-ruby-six-94.vercel.app,http://localhost:5173,http://localhost:3000"
  RATE_LIMIT_REQUESTS_PER_MINUTE = "30"

[[services]]
  internal_port = 8000
  protocol = "tcp"

  [[services.ports]]
    force_https = true
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443
